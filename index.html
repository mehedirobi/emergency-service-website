<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Service Directory</title>

  <link rel="stylesheet" href="styles/style.css" />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Hind+Madurai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body class="hind-madurai-regular bg-gray-100">

<header class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <img src="assets/logo.png" class="w-12 h-12" />
    <h1 class="text-green-700 font-bold leading-tight">
      Emergency <br /> Service
    </h1>
  </div>

  <div class="flex gap-3 items-center">
    <div class="bg-blue-50 px-4 py-2 rounded-full">
      <span id="display-heart" class="font-bold">0</span>
      <i class="fa-solid fa-heart text-red-500 ml-1"></i>
    </div>

    <div class="bg-blue-50 px-4 py-2 rounded-full">
      <span id="coin-display" class="font-bold">100</span>
      <i class="fa-solid fa-coins text-yellow-500 ml-1"></i>
    </div>

    <div class="bg-green-600 text-white px-4 py-2 rounded-full">
      <span id="btn-copy-display">0</span> Copy
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-6 grid lg:grid-cols-4 gap-6">

  <!-- SERVICES (dynamic render from JS) -->
  <section id="service-container" class="lg:col-span-3 grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></section>

  <!-- HISTORY -->
  <aside class="bg-white p-4 rounded-xl shadow">
    <div class="flex justify-between items-center mb-3">
      <h2 class="font-bold flex items-center gap-2">
        <i class="fa-regular fa-clock"></i> Call History
      </h2>

      <button id="btn-clr" class="bg-green-600 text-white px-4 py-1 rounded-lg">
        Clear
      </button>
    </div>

    <div id="call-history" class="space-y-2"></div>
  </aside>

</main>

<script src="JS/index.js"></script>
</body>
</html>
